# Lead Mind 前端静态站点配置
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 文本类资源开启 gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Vite 产物带内容哈希指纹，可放心长缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由回退：任意路径都回到 index.html
    # （将来接入 vue-router history 模式无需再改 nginx）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
